name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test:
    name: ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-24.04
          - rid: linux-arm64
            runner: ubuntu-24.04-arm
          - rid: win-x64
            runner: windows-latest
          - rid: osx-x64
            runner: macos-26-intel
          - rid: osx-arm64
            runner: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_NATIVE=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Run CTest suite
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Run CLI round trip
        shell: python
        run: |
          import pathlib
          import subprocess
          import sys

          candidates = [
              pathlib.Path("build/rapidyenc_cli"),
              pathlib.Path("build/Release/rapidyenc_cli.exe"),
              pathlib.Path("build/Release/rapidyenc_cli"),
          ]
          cli = next((path for path in candidates if path.exists()), None)
          if cli is None:
              sys.exit("rapidyenc_cli was not built")

          payload = b"rapidyenc CI round trip\n\x00\xff"
          encoded = subprocess.run([str(cli), "e"], input=payload, check=True, capture_output=True).stdout
          decoded = subprocess.run([str(cli), "d"], input=encoded, check=True, capture_output=True).stdout
          if decoded != payload:
              sys.exit("CLI round trip changed the payload")

      - name: Run informational benchmark
        continue-on-error: true
        shell: python
        env:
          RAPIDYENC_RID: ${{ matrix.rid }}
        run: |
          import os
          import pathlib
          import subprocess
          import sys

          candidates = [
              pathlib.Path("build/rapidyenc_bench"),
              pathlib.Path("build/Release/rapidyenc_bench.exe"),
              pathlib.Path("build/Release/rapidyenc_bench"),
          ]
          benchmark = next((path for path in candidates if path.exists()), None)
          if benchmark is None:
              sys.exit("rapidyenc_bench was not built")

          result = subprocess.run(
              [str(benchmark)],
              check=True,
              capture_output=True,
              text=True,
          )
          output = "\n".join(part.strip() for part in (result.stdout, result.stderr) if part.strip())
          print(output)

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write(f"### rapidyenc benchmark ({os.environ['RAPIDYENC_RID']})\n\n")
              summary.write("```text\n")
              summary.write(output)
              summary.write("\n```\n")
